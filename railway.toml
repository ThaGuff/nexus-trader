# Railway deployment configuration
[build]
builder = "NIXPACKS"
buildCommand = "cd dashboard && npm install && npm run build && cd ../bot && npm install"

[deploy]
startCommand = "node bot/src/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[volumes]]
mountPath = "/app/data"
